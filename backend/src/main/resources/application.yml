server:
  port: 8080

spring:
  # ---- IKI AYRI DATASOURCE (AI GÜVENLİĞİ İÇİN) ----
  datasource:
    app:
      jdbc-url: jdbc:postgresql://localhost:5432/datapulse
      username: postgres
      password: 1234
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: AppPool

    ai-readonly:
      jdbc-url: jdbc:postgresql://localhost:5432/datapulse
      username: ai_readonly
      password: CHANGE_ME_strong_password_2026!
