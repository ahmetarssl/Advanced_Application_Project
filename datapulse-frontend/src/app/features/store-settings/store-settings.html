<div class="page-container">
  <div class="page-header">
    <div>
      <h1>Store Settings <i class="bi bi-gear"></i></h1>
      <p>Configure your store preferences</p>
    </div>
    <div class="status-toggle">
      <span class="status-label" [class.open]="store.status === 'Open'" [class.closed]="store.status === 'Closed'">
        • {{ store.status }}
      </span>
      <button class="toggle-btn" (click)="toggleStatus()">
        {{ store.status === 'Open' ? 'Close Store' : 'Open Store' }}
      </button>
    </div>
  </div>

  @if (saveSuccess) {
    <div class="alert-success"><i class="bi bi-check-circle-fill"></i> Store settings saved successfully!</div>
  }

  <div class="settings-grid">
    <div class="settings-card">
      <h3><i class="bi bi-shop"></i> Store Information</h3>
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" [(ngModel)]="store.name" class="form-input">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="store.description" class="form-input" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="store.email" class="form-input">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" [(ngModel)]="store.phone" class="form-input">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" [(ngModel)]="store.address" class="form-input">
      </div>
    </div>

    <div class="settings-card">
      <h3><i class="bi bi-sliders"></i> Regional Settings</h3>
      <div class="form-group">
        <label>Currency</label>
        <select [(ngModel)]="store.currency" class="form-input">
          @for (c of currencies; track c) { <option [value]="c">{{ c }}</option> }
        </select>
      </div>
      <div class="form-group">
        <label>Timezone</label>
        <select [(ngModel)]="store.timezone" class="form-input">
          @for (t of timezones; track t) { <option [value]="t">{{ t }}</option> }
        </select>
      </div>

      <h3 class="mt-4"><i class="bi bi-shield-check"></i> Security</h3>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" placeholder="Enter new password" class="form-input">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm new password" class="form-input">
      </div>
    </div>
  </div>

  <div class="save-bar">
    <button class="btn-save" (click)="onSave()"><i class="bi bi-check-lg"></i> Save Changes</button>
  </div>
</div>
