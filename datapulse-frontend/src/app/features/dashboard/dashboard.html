<div class="dashboard-container">

  <div class="kpi-grid">
    @for (kpi of kpiData; track kpi.title) {
      <div class="kpi-card">
        <div class="kpi-header">
          <div class="icon-box" [ngClass]="kpi.colorClass">
            <i class="bi {{ kpi.icon }}"></i>
          </div>
          <div class="trend-badge" [class.positive]="kpi.isPositive" [class.negative]="!kpi.isPositive">
            <i class="bi" [class.bi-arrow-up-short]="kpi.isPositive" [class.bi-arrow-down-short]="!kpi.isPositive"></i>
            {{ kpi.trend }}
          </div>
        </div>
        <div class="kpi-body">
          <h3 class="kpi-value">{{ kpi.value }}</h3>
          <p class="kpi-title">{{ kpi.title }}</p>
        </div>
      </div>
    }
  </div>

 <div class="charts-row">
    <div class="chart-section large">
      <h3>Revenue Overview</h3>
      @if (revenueChartData) {
        <!-- KORUYUCU KALKAN BURADA -->
        <div style="height: 300px; position: relative; width: 100%;">
          <app-chart-wrapper type="line" [data]="revenueChartData" />
        </div>
      }
    </div>

    <div class="chart-section small">
      <h3>Sales by Category</h3>
      @if (categoryChartData) {
        <!-- KORUYUCU KALKAN BURADA -->
        <div style="height: 300px; position: relative; width: 100%;">
          <app-chart-wrapper type="doughnut" [data]="categoryChartData" />
        </div>
      }
    </div>
  </div>
