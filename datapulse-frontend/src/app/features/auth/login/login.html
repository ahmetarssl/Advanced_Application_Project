<div class="login-container">
  <div class="login-box">
    <h2>DataPulse'a Giriş Yap</h2>

    <div class="error-box" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>E-posta Adresi</label>
        <input type="email" name="email" [(ngModel)]="email" required placeholder="ornek@email.com">
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input type="password" name="password" [(ngModel)]="password" required placeholder="Şifrenizi girin">
      </div>

      <button type="submit" class="login-btn">Giriş Yap</button>
    </form>
  </div>
</div>
