<div class="page-container">
  <div class="page-header">
    <div>
      <h1>User Management <i class="bi bi-person-gear"></i></h1>
      <p>Manage all platform users and permissions</p>
    </div>
    <button class="btn-primary" (click)="showAddModal = true">
      <i class="bi bi-person-plus"></i> Add User
    </button>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" [(ngModel)]="searchTerm" placeholder="Search by email...">
    </div>
    <div class="role-tabs">
      @for (r of roles; track r) {
        <button class="tab" [class.active]="filterRole === r" (click)="filterRole = r">{{ r }}</button>
      }
    </div>
  </div>

  <div class="table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>USER</th>
          <th>ROLE</th>
          <th>STATUS</th>
          <th>JOINED</th>
          <th>ORDERS</th>
          <th>ACTIONS</th>
        </tr>
      </thead>
      <tbody>
        @for (u of filtered; track u.id) {
          <tr>
            <td>
              <div class="user-cell">
                <div class="avatar" [ngClass]="'role-' + u.role.toLowerCase()">{{ u.initials }}</div>
                {{ u.email }}
              </div>
            </td>
            <td><span class="role-badge" [ngClass]="u.role.toLowerCase()">{{ u.role }}</span></td>
            <td><span class="status-dot" [class.active]="u.status === 'Active'" [class.suspended]="u.status === 'Suspended'">• {{ u.status }}</span></td>
            <td class="muted">{{ u.joinDate }}</td>
            <td>{{ u.orders }}</td>
            <td>
              <div class="action-btns">
                <button class="icon-btn" (click)="toggleStatus(u)" [title]="u.status === 'Active' ? 'Suspend' : 'Activate'">
                  <i class="bi" [class.bi-pause-circle]="u.status === 'Active'" [class.bi-play-circle]="u.status === 'Suspended'"></i>
                </button>
                <button class="icon-btn danger" (click)="deleteUser(u.id)" title="Delete">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  @if (showAddModal) {
    <div class="modal-overlay" (click)="showAddModal = false">
      <div class="modal" (click)="$event.stopPropagation()">
        <div class="modal-header">
          <h3>Add New User</h3>
          <button class="close-btn" (click)="showAddModal = false"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="newUser.email" placeholder="user@example.com" class="form-input">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select [(ngModel)]="newUser.role" class="form-input">
              <option value="INDIVIDUAL">Individual</option>
              <option value="CORPORATE">Corporate</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Temporary Password</label>
            <input type="password" [(ngModel)]="newUser.password" placeholder="Temporary password" class="form-input">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" (click)="showAddModal = false">Cancel</button>
          <button class="btn-primary" (click)="addUser()">Create User</button>
        </div>
      </div>
    </div>
  }
</div>
